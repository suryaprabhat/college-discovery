services:
  - type: web
    name: college-discovery-backend
    env: node
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build && npx ts-node prisma/seed_api.ts
    startCommand: node dist/index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: college-discovery-db
          property: connectionString
      - key: NODE_ENV
        value: production

databases:
  - name: college-discovery-db
    region: singapore
    plan: free
